<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src 'self' data:;" />
<title>Restash · Add to stash</title>
<style>
  :root{
    --ink:#fff; --mute:#8a8a92; --dim:#b8b8be;
    --accent:#c97a00;
    --black:#000; --elev:#1c1c20;
    --hair:rgba(255,255,255,.14); --hair2:rgba(255,255,255,.26);
    --green:#43d17a; --green-fill:rgba(31,138,59,.14); --green-border:rgba(67,209,122,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{ background:transparent; color:var(--ink); font-family:'Inter',-apple-system,sans-serif; font-size:13px; -webkit-font-smoothing:antialiased; overflow:hidden; }
  body{ padding:0; }

  /* THE NOTCH — sits at the top of the screen, always present.
     Idle: invisible behind the real hardware notch. Expanded: grows downward
     into the save shelf. No painted notch graphics, no border — the panel
     emerges as a seamless black extension of the real hardware notch. */
  .nook{
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:188px;
    background:var(--black);
    border-radius:0 0 16px 16px;
    overflow:hidden;
    transition:width .34s cubic-bezier(.22,1,.36,1), border-radius .34s;
  }
  .nook.open{
    width:362px;
    border-radius:0 0 26px 26px;
  }

  /* Notch spacer — pure-black strip occupying the real hardware notch's
     vertical space so the visible body content begins at the notch bottom.
     Drawn under the hardware notch; never has decoration. */
  .notch-spacer{ height:32px; background:var(--black); }

  /* Body unfolds via max-height / opacity. Lives at zero height while idle. */
  .body{ max-height:0; opacity:0; overflow:hidden; transition:max-height .34s cubic-bezier(.22,1,.36,1), opacity .26s; }
  .nook.open .body{ max-height:560px; opacity:1; }
  .pad{ padding:6px 13px 14px; }

  .lead{ display:flex; align-items:center; gap:7px; margin-bottom:10px; }
  .lead .logo{ width:15px; height:15px; color:#fff; }
  .lead b{ font-weight:600; font-size:12.5px; }

  .dropcue{ border:1.5px dashed #3a3a42; border-radius:9px; padding:14px 10px; text-align:center; font-size:12px; color:var(--mute); transition:.15s; }
  .nook.hot .dropcue{ border-color:var(--accent); background:rgba(201,122,0,.08); color:var(--dim); }

  .or{ display:flex; align-items:center; gap:8px; margin:9px 0; color:var(--mute); font-family:'ui-monospace',SFMono-Regular,Menlo,monospace; font-size:9px; letter-spacing:1px; text-transform:uppercase; }
  .or::before,.or::after{ content:""; height:1px; flex:1; background:var(--hair); }

  .qrow{ display:flex; align-items:center; gap:7px; background:var(--elev); border:1px solid var(--hair); border-radius:9px; padding:8px 10px; }
  .qrow + .qrow{ margin-top:7px; }
  .qrow:focus-within{ border-color:var(--hair2); }
  .qrow .kind{ font-family:'ui-monospace',SFMono-Regular,Menlo,monospace; font-size:9px; letter-spacing:.5px; text-transform:uppercase; color:var(--black); background:var(--dim); border-radius:5px; padding:2px 6px; flex:0 0 auto; }
  .qrow .kind.url{ background:#7aa2ff; }
  .qrow .kind.file{ background:#c9a3ff; }
  .qrow .kind.wallet{ background:#ffb45a; }
  .qrow .kind.cmd{ background:#9be38a; }
  .qrow input{ flex:1; min-width:0; background:transparent; border:0; outline:0; color:var(--ink); font-family:'Inter',-apple-system,sans-serif; font-size:13px; }
  .qrow input::placeholder{ color:var(--mute); }
  .qrow .pre{ font-family:'ui-monospace',SFMono-Regular,Menlo,monospace; font-size:9px; letter-spacing:.5px; text-transform:uppercase; color:var(--mute); flex:0 0 auto; }

  .ctrls{ display:flex; align-items:center; gap:7px; margin-top:9px; }
  .sel{ display:flex; align-items:center; gap:6px; background:var(--elev); border:1px solid var(--hair); border-radius:9px; padding:7px 9px; font-size:12px; color:var(--dim); }
  .sel select{ background:transparent; border:0; outline:0; color:#fff; font-family:'Inter',-apple-system,sans-serif; font-size:12.5px; cursor:pointer; appearance:none; -webkit-appearance:none; }
  .sel select option{ background:#1c1c20; color:#fff; }
  .pin{ display:flex; align-items:center; gap:6px; background:var(--elev); border:1px solid var(--hair); border-radius:9px; padding:7px 11px; font-size:12px; color:var(--dim); cursor:pointer; user-select:none; transition:.13s; white-space:nowrap; }
  .pin:hover{ border-color:var(--hair2); color:#fff; }
  .pin.on{ background:rgba(201,122,0,.16); border-color:var(--accent); color:var(--accent); }
  .pin svg{ width:13px; height:13px; }
  .qbtn{ flex:1; display:flex; align-items:center; justify-content:center; gap:7px; background:var(--accent); color:#fff; border:0; border-radius:9px; padding:9px; font-family:'ui-monospace',SFMono-Regular,Menlo,monospace; font-size:11px; letter-spacing:.6px; text-transform:uppercase; cursor:pointer; transition:.15s; }
  .qbtn:hover:not(:disabled){ filter:brightness(1.1); }
  .qbtn:disabled{ background:var(--elev); color:var(--mute); cursor:default; }
  .qbtn svg{ width:15px; height:15px; }

  .saved{ display:none; align-items:center; gap:8px; margin-top:9px; background:var(--green-fill); border:1px solid var(--green-border); color:#cdebd6; border-radius:9px; padding:8px 10px; font-size:12px; }
  .saved.show{ display:flex; }
  .saved .ok{ color:var(--green); font-weight:700; }
  .saved b{ color:#fff; font-weight:600; }
  .saved .undo{ margin-left:auto; font-family:'ui-monospace',SFMono-Regular,Menlo,monospace; font-size:10.5px; color:var(--dim); cursor:pointer; text-decoration:underline; background:transparent; border:0; padding:0; }

  .newstash{ display:none; align-items:center; gap:7px; margin-top:7px; background:var(--elev); border:1px solid var(--hair); border-radius:9px; padding:8px 10px; }
  .newstash.show{ display:flex; }
  .newstash .pre{ font-family:'ui-monospace',SFMono-Regular,Menlo,monospace; font-size:9px; letter-spacing:.5px; text-transform:uppercase; color:var(--mute); }
  .newstash input{ flex:1; min-width:0; background:transparent; border:0; outline:0; color:var(--ink); font-family:'Inter',-apple-system,sans-serif; font-size:13px; }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="rs" viewBox="0 0 24 24"><rect x="7.5" y="3.6" width="9" height="2.3" rx="1.15" fill="currentColor"/><rect x="5.2" y="6.8" width="13.6" height="2.3" rx="1.15" fill="currentColor"/><rect x="4" y="10.2" width="16" height="9.8" rx="2.4" fill="none" stroke="currentColor" stroke-width="2.4"/></symbol>
  <symbol id="i-pin" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.8a2 2 0 0 1-1.1 1.8l-1.8.9A2 2 0 0 0 5 15.2V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.8a2 2 0 0 0-1.1-1.8l-1.8-.9A2 2 0 0 1 15 10.8V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></g></symbol>
  <symbol id="i-ret" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 10l-4 4 4 4"/><path d="M5 14h11a4 4 0 0 0 4-4V6"/></g></symbol>
</svg>

<div class="nook" id="nook">
  <div class="notch-spacer"></div>
  <div class="body">
    <div class="pad">
      <div class="lead"><svg class="logo"><use href="#rs"/></svg><b>Add to stash</b></div>
      <div class="dropcue" id="dropcue">Drop a file, link, or text here</div>
      <div class="or">details</div>
      <div class="qrow"><span class="kind" id="kind">Text</span><input id="q" type="text" placeholder="Type or paste a phrase…" autocomplete="off" spellcheck="false" /></div>
      <div class="qrow"><span class="pre">Name</span><input id="nameI" type="text" placeholder="Optional — defaults to the item" autocomplete="off" spellcheck="false" /></div>
      <div class="ctrls">
        <div class="sel">To <select id="stashSel"></select></div>
        <button class="pin" id="pinBtn" type="button"><svg><use href="#i-pin"/></svg>Pin</button>
        <button class="qbtn" id="stashBtn" type="button" disabled>Stash it <svg><use href="#i-ret"/></svg></button>
      </div>
      <div class="newstash" id="newStashRow"><span class="pre">New</span><input id="newStashInput" type="text" placeholder="Name your stash…" autocomplete="off" spellcheck="false" /></div>
      <div class="saved" id="saved">
        <span class="ok">✓</span><span id="savedMsg">Saved</span>
        <button class="undo" id="undoBtn" type="button">Undo</button>
      </div>
    </div>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const nook = $('nook'), dropcue = $('dropcue');
  const q = $('q'), nameI = $('nameI'), kindBadge = $('kind');
  const stashSel = $('stashSel'), pinBtn = $('pinBtn'), stashBtn = $('stashBtn');
  const saved = $('saved'), savedMsg = $('savedMsg'), undoBtn = $('undoBtn');
  const newStashRow = $('newStashRow'), newStashInput = $('newStashInput');

  let pinned = false;
  let stashes = [];
  let lastSavedId = null;
  let undoTimer = null;
  let collapseTimer = null;
  let pendingFiles = [];

  function detectKind(rawV){
    const v = (rawV || '').trim();
    if (!v) return { kind:'text', cls:'', tag:undefined, label:'Text' };
    if (/^https?:\/\/|^www\.|^[\w.-]+\.\w{2,}(\/|$)/i.test(v)) return { kind:'url', cls:'url', label:'Link' };
    if (/^0x[0-9a-fA-F]{6,}/.test(v)) return { kind:'cryptoAddress', cls:'wallet', tag:'ETH', label:'Wallet' };
    if (/^(bc1|tb1)[a-z0-9]{20,}/i.test(v) || /^[13][a-km-zA-HJ-NP-Z1-9]{20,}$/.test(v)) return { kind:'cryptoAddress', cls:'wallet', tag:'BTC', label:'Wallet' };
    if (/^(npm|git|cd|ssh|sudo|brew|vercel|docker|python|node|yarn|pnpm)\b/.test(v)) return { kind:'command', cls:'cmd', label:'Command' };
    return { kind:'text', cls:'', label:'Text' };
  }
  function snippet(s){ s=(s||'').trim(); return s.length > 22 ? s.slice(0,22) + '…' : s; }
  function midTruncate(s){ s=(s||''); return s.length > 14 ? s.slice(0,6) + '…' + s.slice(-4) : s; }
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c])); }

  function updateKindBadge(){
    if (pendingFiles.length) {
      kindBadge.textContent = 'File'; kindBadge.className = 'kind file';
      stashBtn.disabled = false;
      return;
    }
    const d = detectKind(q.value);
    kindBadge.textContent = d.label;
    kindBadge.className = 'kind ' + d.cls;
    stashBtn.disabled = q.value.trim().length === 0;
  }
  q.addEventListener('input', () => { if (pendingFiles.length) pendingFiles = []; updateKindBadge(); });
  q.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); doStash(); } });
  nameI.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); doStash(); } });

  pinBtn.addEventListener('click', () => { pinned = !pinned; pinBtn.classList.toggle('on', pinned); });

  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') collapse(); });

  // ---------- Drag-to-reveal ----------
  function openNook(){
    clearTimeout(collapseTimer);
    if (!nook.classList.contains('open')) {
      nook.classList.add('open');
      try { window.shelf.expand(); } catch {}
    }
  }
  function collapse(){
    clearTimeout(collapseTimer);
    nook.classList.remove('open');
    nook.classList.remove('hot');
    saved.classList.remove('show');
    newStashRow.classList.remove('show');
    q.value = ''; nameI.value = '';
    pinned = false; pinBtn.classList.remove('on');
    pendingFiles = [];
    dropcue.textContent = 'Drop a file, link, or text here';
    updateKindBadge();
    lastSavedId = null;
    if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; }
    try { window.shelf.collapse(); } catch {}
  }

  ;['dragenter','dragover'].forEach((ev) => {
    nook.addEventListener(ev, (e) => {
      e.preventDefault();
      if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
      openNook();
      nook.classList.add('hot');
    });
  });
  nook.addEventListener('dragleave', (e) => {
    if (e.relatedTarget && nook.contains(e.relatedTarget)) return;
    nook.classList.remove('hot');
    collapseTimer = setTimeout(() => {
      if (!saved.classList.contains('show') && !pendingFiles.length && !q.value.trim()) collapse();
    }, 400);
  });

  // After a drop the panel must take keystrokes so the user can edit the name
  // and hit Enter / "Stash it". Focusing the field during the in-flight drag is
  // not possible, so we ask main to foreground the window once the drop lands,
  // then move caret focus to the most useful field.
  async function focusAfterDrop(field){
    try { await window.shelf.focusWindow(); } catch {}
    setTimeout(() => { try { field.focus(); field.select?.(); } catch {} }, 20);
  }

  nook.addEventListener('drop', async (e) => {
    e.preventDefault();
    nook.classList.remove('hot');
    openNook();
    const dt = e.dataTransfer; if (!dt) return;
    const files = Array.from(dt.files || []);
    const paths = files.map((f) => (window.shelf?.pathForFile?.(f) || f.path)).filter(Boolean);
    if (paths.length) {
      pendingFiles = paths;
      const first = files[0]?.name || 'file';
      q.value = first;
      nameI.value = first.replace(/\.[^.]+$/, '');
      dropcue.textContent = paths.length === 1 ? `${first} — ready to stash` : `${paths.length} files — ready to stash`;
      updateKindBadge();
      focusAfterDrop(nameI);
      return;
    }
    const uri = (dt.getData('text/uri-list') || '').trim();
    const txt = (dt.getData('text/plain') || '').trim();
    const payload = uri || txt;
    if (!payload) return;
    q.value = payload;
    nameI.value = '';
    updateKindBadge();
    focusAfterDrop(nameI);
  });

  // ---------- Stash dropdown + "New stash…" inline ----------
  function renderStashOptions(){
    const current = stashSel.value;
    stashSel.innerHTML = '';
    stashes.forEach((s) => {
      const opt = document.createElement('option');
      opt.value = s.id; opt.textContent = s.name;
      stashSel.appendChild(opt);
    });
    const newOpt = document.createElement('option');
    newOpt.value = '__new__'; newOpt.textContent = 'New stash…';
    stashSel.appendChild(newOpt);
    if (current && stashes.some((s) => s.id === current)) stashSel.value = current;
  }
  function showNewStashInline(){ newStashRow.classList.add('show'); setTimeout(() => { newStashInput.focus(); newStashInput.select(); }, 10); }
  function hideNewStashInline(){ newStashRow.classList.remove('show'); newStashInput.value = ''; }
  async function createInlineStash(){
    const name = newStashInput.value.trim();
    if (!name) { hideNewStashInline(); return null; }
    const created = await window.shelf.createStash(name);
    if (!created || !created.ok) return null;
    stashes = await window.shelf.listStashes();
    renderStashOptions();
    stashSel.value = created.stash.id;
    hideNewStashInline();
    return created.stash.id;
  }
  stashSel.addEventListener('change', () => {
    if (stashSel.value === '__new__') showNewStashInline(); else hideNewStashInline();
  });
  newStashInput.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter') { e.preventDefault(); await createInlineStash(); q.focus(); }
    else if (e.key === 'Escape') { e.preventDefault(); hideNewStashInline(); stashSel.value = 'all'; q.focus(); }
  });

  // ---------- Save ----------
  async function doStash(){
    let stashId = stashSel.value;
    if (stashId === '__new__') { stashId = await createInlineStash(); if (!stashId) return; }

    if (pendingFiles.length) {
      const r = await window.shelf.ingestFiles(pendingFiles, stashId, pinned);
      const okCount = (r && r.results || []).filter((x) => x.ok).length;
      const failCount = (r && r.results || []).filter((x) => !x.ok).length;
      const stashName = (stashes.find((s) => s.id === stashId) || { name: 'All' }).name;
      const allPinned = pinned && okCount > 0 && (r.results || []).filter((x) => x.ok).every((x) => x.pinned);
      const pinSuffix = allPinned ? ' · pinned' : (pinned && !allPinned ? ' · pin slots full' : '');
      savedMsg.innerHTML = 'Saved <b>' + okCount + '</b> file' + (okCount === 1 ? '' : 's') + ' to <b>' + escapeHtml(stashName) + '</b>' + (failCount ? ' · ' + failCount + ' skipped' : '') + pinSuffix;
      saved.classList.add('show');
      pendingFiles = []; q.value = ''; nameI.value = '';
      pinned = false; pinBtn.classList.remove('on');
      dropcue.textContent = 'Drop a file, link, or text here';
      if (undoTimer) clearTimeout(undoTimer);
      undoTimer = setTimeout(() => { collapse(); }, 2200);
      return;
    }

    const raw = q.value.trim();
    if (!raw) return;
    const detect = detectKind(raw);
    const explicitName = nameI.value.trim();
    const label = explicitName || (detect.kind === 'cryptoAddress' ? midTruncate(raw) : snippet(raw));
    const result = await window.shelf.addFromQuick({
      kind: detect.kind, value: raw, label, tag: detect.tag,
      stashId, pinned,
    });
    if (!result || !result.ok) { savedMsg.textContent = 'Couldn’t save'; saved.classList.add('show'); return; }
    lastSavedId = result.id;
    const stashName = (stashes.find((s) => s.id === stashId) || { name: 'All' }).name;
    const pinSuffix = pinned && result.pinned ? ' · pinned' : (pinned && !result.pinned ? ' · pin slots full' : '');
    savedMsg.innerHTML = 'Saved <b>' + escapeHtml(label) + '</b> to <b>' + escapeHtml(stashName) + '</b>' + pinSuffix;
    saved.classList.add('show');
    q.value = ''; nameI.value = ''; pinned = false; pinBtn.classList.remove('on');
    updateKindBadge();
    if (undoTimer) clearTimeout(undoTimer);
    undoTimer = setTimeout(() => { collapse(); }, 2200);
  }
  stashBtn.addEventListener('click', doStash);

  undoBtn.addEventListener('click', async () => {
    if (!lastSavedId) { saved.classList.remove('show'); return; }
    const id = lastSavedId; lastSavedId = null;
    if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; }
    await window.shelf.undoAdd(id);
    saved.classList.remove('show');
  });

  // ---------- Lifecycle ----------
  async function refreshStashes(){
    stashes = await window.shelf.listStashes();
    renderStashOptions();
    const last = await window.shelf.getLastUsedStash();
    if (last && stashes.some((s) => s.id === last)) stashSel.value = last;
    else stashSel.value = 'all';
  }
  window.shelf?.onStashesChanged?.(refreshStashes);

  refreshStashes();
  updateKindBadge();
</script>
</body>
</html>
