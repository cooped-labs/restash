name: ci

on:
  push:
    branches: ['**']
  pull_request: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Zero-install policy: fail the build if main.js/platform/*.js spawn any
      # banned user-installed tool (xdotool/ydotool/xclip/wl-copy/wmctrl/...).
      - name: Zero-install policy lint
        run: node scripts/lint-no-banned-tools.js
      - name: Syntax check changed JS
        run: |
          node --check main.js
          node --check preload.js
          for f in platform/*.js; do node --check "$f"; done

  # Compile the Linux native helper on every push/PR so a missing source or
  # broken extern (the regression class that motivated RES-30) fails the build
  # immediately, not only on a tagged release. Installs libei + libportal dev
  # so the -DHAVE_LIBEI branch in native/build-linux-helper.sh is exercised —
  # that's the path that links wayland_ei.c and would silently rot otherwise.
  linux-build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          # patchelf is invoked by scripts/bundle-linux-libs.sh (called from
          # build-linux-helper.sh) to rewrite RPATH on each vendored .so.
          sudo apt-get install -y \
            libxcb1-dev libxcb-xtest0-dev libxcb-util-dev \
            libportal-dev patchelf
          # libei-dev is only available on ubuntu-24.04+; on 22.04 the build
          # falls back to X11-only (no -DHAVE_LIBEI). Optional install.
          sudo apt-get install -y libei-dev 2>/dev/null || true
      - name: Build restash-linux-helper
        run: bash native/build-linux-helper.sh
      - name: Verify binary + bundle
        run: |
          test -x bin/restash-linux-helper
          file bin/restash-linux-helper
          ls -la vendor/linux-lib/

      # RES-30 AC1: on a CLEAN ubuntu:22.04 (no -dev packages installed), the
      # helper's ldd output must resolve every non-ABI dep to the bundled lib —
      # never to /usr or /lib on the host. Reproduces the layout the AppImage
      # uses (bin/ + lib/ at the same parent, so $ORIGIN/../lib resolves) and
      # uses the ubuntu-runner's Docker to host it.
      - name: AC1 — ldd resolution on clean ubuntu:22.04
        run: |
          # Lay out the same structure electron-builder ships in <Resources>/.
          rm -rf /tmp/restash-bundle
          mkdir -p /tmp/restash-bundle/bin /tmp/restash-bundle/lib
          cp bin/restash-linux-helper /tmp/restash-bundle/bin/
          # vendor/linux-lib -> lib (matches package.json linux.extraResources).
          cp -a vendor/linux-lib/*.so* /tmp/restash-bundle/lib/ 2>/dev/null || true
          # ubuntu:22.04 base image is intentionally bare — NO apt-get install.
          # Every non-ABI dep must resolve from /bundle/lib via the helper's
          # RPATH ($ORIGIN/../lib). Glibc satellites (libc/libm/libpthread/...)
          # are part of the base image and may resolve to /usr or /lib.
          docker run --rm -v /tmp/restash-bundle:/bundle:ro ubuntu:22.04 bash -eu -c '
            ldd /bundle/bin/restash-linux-helper > /tmp/ldd.txt || true
            echo "--- ldd output ---"
            cat /tmp/ldd.txt
            # Hard fail on any "not found" — means the bundler missed a dep.
            if grep -F "not found" /tmp/ldd.txt; then
              echo "ERROR: unresolved deps in clean ubuntu:22.04 (bundler missed them)" >&2
              exit 1
            fi
            # ABI allow-list — these are part of glibc/libgcc/libstdc++ and
            # legitimately resolve to host /usr or /lib paths.
            ALLOW="libc\\.so|libm\\.so|libpthread\\.so|libdl\\.so|librt\\.so|libresolv\\.so|libutil\\.so|libnsl\\.so|libcrypt\\.so|libgcc_s\\.so|libstdc\\+\\+\\.so|ld-linux|linux-vdso"
            if grep -E "=> /(usr|lib)/" /tmp/ldd.txt | grep -vE "$ALLOW" > /tmp/leaks.txt; then
              echo "ERROR: non-ABI deps resolve to host paths (zero-install regression):" >&2
              cat /tmp/leaks.txt >&2
              exit 1
            fi
            echo "OK: every non-ABI dep resolves to /bundle; ABI deps come from host glibc."
          '
